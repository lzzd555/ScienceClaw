<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPA Eval Auth</title>
    <script>
      const token = new URLSearchParams(window.location.search).get('token')
      if (token) {
        window.localStorage.setItem('rpa_eval_token', token)
      }
    </script>
  </head>
  <body>RPA eval auth ready.</body>
</html>
